org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=false

# Fix: Kotlin incremental compilation crashes when project (D:) and pub cache (C:) are on different drives.
# This disables incremental compilation to prevent the "different roots" error.
kotlin.incremental=false

# Disable parallel builds to avoid daemon crashes on low-memory systems
org.gradle.parallel=false
org.gradle.daemon=true
org.gradle.configureondemand=false
