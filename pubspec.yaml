name: safepay
description: SafePay - Consent-Based UPI Payment System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.3.4
  firebase_messaging: ^15.2.10
  firebase_app_check: ^0.3.2+10
  cloud_functions: ^5.2.0
  google_sign_in: ^6.2.2
    

  # State Management
  provider: ^6.1.2

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  dotted_border: ^2.1.0

  # Navigation
  go_router: ^14.3.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # Utils
  uuid: ^4.4.2
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  crypto: ^3.0.6
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0
  pinput: ^3.0.1
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.5
  flutter_contacts: ^1.1.9+1
  url_launcher: ^6.3.0

  # Notifications
  flutter_local_notifications: ^17.2.3
  http: ^1.3.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
